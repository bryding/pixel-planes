<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="css/style.css"></head><body>
<canvas id="game"></canvas>
<div id="startScreen" style="display:none"></div><div id="settingsScreen" style="display:none"></div>
<div id="topBar"><div id="modGroup"></div><div id="modeGroup"></div></div>
<div id="pauseMenu" style="display:none"><div class="pauseInner" id="pauseMain"></div>
<div class="pauseInner" id="createServer" style="display:none"></div><div class="pauseInner" id="serverList" style="display:none"></div>

<script src="js/config.js"></script><script src="js/net.js"></script><script src="js/input.js"></script>

<script>
  startGame(); removeAllBots();
  setPlayerColor('#e84393');           // pink
  player.alive=true; playerState='flying'; player.x=4000; player.y=CONFIG.GROUND_Y-500; player.angle=-0.15; player.vx=0; player.throttle=0;
  camera.x=player.x-CONFIG.GAME_W/2; camera.y=player.y-CONFIG.GAME_H/2;
  paused=true; draw();
