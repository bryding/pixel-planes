<script>
  removeAllBots();
  Net.inServer = true; Net.serverName='STARLINK';
  player.x=BARN_X; player.y=CONFIG.GROUND_Y-500; player.angle=0; playerState='flying';
  remotePlayers[2]={x:BARN_X-260,y:CONFIG.GROUND_Y-540,angle:0.3,name:'Maya',last:frameCount};
  remotePlayers[3]={x:BARN_X+280,y:CONFIG.GROUND_Y-470,angle:Math.PI,name:'Leo',last:frameCount};
  remotePlayers[4]={x:BARN_X+60,y:CONFIG.GROUND_Y-650,angle:-0.6,name:'Zoe',last:frameCount};

  draw();
