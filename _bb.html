<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>
<canvas id="game"></canvas><div id="clickGate" style="display:none"></div><div id="startScreen"></div>
<div id="settingsScreen" style="display:none"><input type="range" id="volSlider" value="50"><p id="volLabel">50%</p></div>
<div id="topBar"><div id="modGroup"></div><div id="modeGroup"></div></div>
<div id="pauseMenu" style="display:none"><div class="pauseInner" id="pauseMain"></div><div class="pauseInner" id="createServer" style="display:none"></div><div class="pauseInner" id="serverList" style="display:none"></div><div class="pauseInner" id="inServer" style="display:none"></div><div class="pauseInner" id="colorPanel" style="display:none"></div></div>
<div id="out">PENDING</div>
<script>window.__e=[];window.onerror=(m,s,l,c)=>window.__e.push(m+' @'+l);</script>
<script src="js/config.js"></script><script src="js/audio.js"></script><script src="js/net.js"></script><script src="js/input.js"></script>
<script src="js/physics.js"></script><script src="js/bullet.js"></script><script src="js/missile.js"></script>
<script src="js/explosion.js"></script><script src="js/powerup.js"></script><script src="js/sprites.js"></script>
<script src="js/scenery.js"></script><script src="js/plane.js"></script><script src="js/enemy.js"></script>
<script src="js/pilot.js"></script><script src="js/game.js"></script>
<script>
const r={};
try{
  startGame(); Sound.init();
  Sound.boom();   // should not throw
  r.boomOk = true;
  // enemy bullet color == player bullet color
  addBot(); const bot = enemies[enemies.length-1];
  bot.alive=true;
  const before = bullets.length;
  bot.shoot(bullets);
  const eb = bullets[bullets.length-1];
  r.enemyBulletColor = eb.color;
  r.playerBulletColor = CONFIG.COLORS.bullet;
  r.bulletsMatch = eb.color === CONFIG.COLORS.bullet;
  r.err=window.__e;
  document.getElementById('out').textContent='RESULT '+JSON.stringify(r);
}catch(e){document.getElementById('out').textContent='THREW '+e.message+' | '+e.stack;}
</script></body></html>
