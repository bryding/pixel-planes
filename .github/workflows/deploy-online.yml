# Publishes the /online client to GitHub Pages on every push to this branch,
# so the multiplayer game is always up to date at:
#   https://bryding.github.io/pixel-planes/
# (It still connects to the same multiplayer server, wss://pixel-planes.onrender.com.)
name: Deploy online client to Pages

on:
  push:
    branches: [single-plus-online]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: online
      - id: deployment
        uses: actions/deploy-pages@v4
