<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>
<canvas id="game"></canvas>
<div id="startScreen"></div><div id="settingsScreen" style="display:none"></div>
<div id="topBar"><div id="modGroup"></div><div id="modeGroup"></div></div>
<div id="pauseMenu" style="display:none">
  <div class="pauseInner" id="pauseMain"></div>
  <div class="pauseInner" id="createServer" style="display:none"></div>
  <div class="pauseInner" id="serverList" style="display:none"></div>
  <div class="pauseInner" id="inServer" style="display:none"></div>
  <div class="pauseInner" id="colorPanel" style="display:none"><input type="color" id="colorWheel" value="#3d8fd6"></div>
</div>
<div id="out">P</div>
<script>window.__e=[];window.onerror=(m,s,l,c)=>window.__e.push(m+' @'+l);</script>
<script src="js/config.js"></script><script src="js/net.js"></script><script src="js/input.js"></script>
<script src="js/physics.js"></script><script src="js/bullet.js"></script><script src="js/missile.js"></script>
<script src="js/explosion.js"></script><script src="js/powerup.js"></script><script src="js/sprites.js"></script>
<script src="js/scenery.js"></script><script src="js/plane.js"></script><script src="js/enemy.js"></script>
<script src="js/pilot.js"></script><script src="js/game.js"></script>
<script>
const r={};
try{
  localStorage.removeItem('pp_playercolor');
  const defaultSet = playerSpriteSet;
  setPlayerColor('#e84393');                 // pink (a preset)
  r.spriteChanged = playerSpriteSet !== defaultSet && !!playerSpriteSet;
  r.saved = localStorage.getItem('pp_playercolor') === '#e84393';
  r.wheelSynced = document.getElementById('colorWheel').value === '#e84393';
  // bad input rejected
  const before = playerSpriteSet;
  setPlayerColor('notacolor');
  r.rejectsBad = playerSpriteSet === before;
  // panel switching
  showColorPanel(); r.panelShown = document.getElementById('colorPanel').style.display==='flex';
  // draw the player in the custom color (no error)
  startGame(); player.alive=true; playerState='flying';
  for(let f=0;f<3;f++){ update(); draw(); }
  // color persists across "reload" (getPlayerColor)
  r.persists = getPlayerColor()==='#e84393';
  r.err=window.__e;
  document.getElementById('out').textContent='RESULT '+JSON.stringify(r);
}catch(e){document.getElementById('out').textContent='THREW '+e.message+' | '+e.stack;}
</script></body></html>
