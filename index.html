<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pixel Planes</title>
  <!-- Reuse the game's pixel-art styling (titleBanner, startBtn, etc.) -->
  <link rel="stylesheet" href="css/style.css?v=18" />
  <style>
    /* The chooser has no game canvas behind it, so paint a simple sky here. */
    body { background: linear-gradient(#5fb6e6 0%, #8fd0f0 55%, #cfeeff 100%); }
    #chooser {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
    }
    /* Two clear, big choices stacked on top of each other. */
    .modeButtons { display: flex; flex-direction: column; gap: 18px; align-items: center; }
    .startBtn.mode { min-width: 340px; padding: 22px 50px; font-size: 26px; text-decoration: none; text-align: center; }
  </style>
</head>
<body>
  <!-- The very first screen: pick how you want to play. -->
  <div id="chooser">
    <div class="titleBanner">PIXEL&nbsp;PLANES</div>
    <p class="startHint">How do you want to play? ✈️</p>
    <div class="modeButtons">
      <!-- Single Player = the full offline game with all the modes & options -->
      <a class="startBtn mode" href="solo/index.html">🤖 Single Player</a>
      <!-- Multiplayer = the live shared world with other people online -->
      <a class="startBtn mode" href="online/">🌍 Multiplayer Online</a>
    </div>
    <p class="startHint">Single Player has all the game modes &amp; options 🎮</p>
  </div>
</body>
</html>
