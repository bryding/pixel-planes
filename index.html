<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Planes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- This is the box the whole game is drawn onto -->
  <canvas id="game"></canvas>

  <!-- Top-middle modifier / cheat menu -->
  <div id="topBar">
    <button id="modBtn" onclick="toggleModMenu(); this.blur();">⚙ Modifier Menu</button>
    <div id="modMenu" style="display:none">
      <button onclick="addBot(); this.blur();">+ Add Plane</button>
      <button onclick="removeBot(); this.blur();">- Remove Plane</button>
      <button onclick="setHalfSpeed(this); this.blur();">0.5x Speed</button>
      <button onclick="setDoubleSpeed(this); this.blur();">2x Speed</button>
      <button onclick="giveShield(); this.blur();">Add Shield Power</button>
      <button onclick="giveBullet(); this.blur();">Add Bullet Power</button>
      <button onclick="giveFreeze(); this.blur();">Add Freeze Power</button>
      <button onclick="this.textContent='∞ Health: '+(toggleInfHealth()?'ON':'OFF'); this.blur();">∞ Health: OFF</button>
      <button onclick="this.textContent='∞ Missiles: '+(toggleInfMissiles()?'ON':'OFF'); this.blur();">∞ Missiles: OFF</button>
    </div>
  </div>

  <!-- The scripts run top to bottom, so order matters here -->
  <script src="js/config.js"></script>
  <script src="js/input.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/missile.js"></script>
  <script src="js/explosion.js"></script>
  <script src="js/powerup.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/scenery.js"></script>
  <script src="js/plane.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/pilot.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
