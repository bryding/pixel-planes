<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Planes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- This is the box the whole game is drawn onto -->
  <canvas id="game"></canvas>

  <!-- Top-middle modifier / cheat menu -->
  <div id="topBar">
   <div class="menuGroup" id="modGroup">
    <button id="modBtn" onclick="toggleModMenu(); this.blur();">⚙ Modifier Menu</button>
    <div id="modMenu" style="display:none">
      <button onclick="addBot(); this.blur();">+ Add Plane</button>
      <button onclick="removeBot(); this.blur();">- Remove Plane</button>
      <button onclick="addManyBots(50); this.blur();">+ Add 50 Planes</button>
      <button onclick="removeAllBots(); this.blur();">Remove ALL Planes</button>
      <button id="halfBtn" onclick="setHalfSpeed(this); this.blur();">0.5x Speed</button>
      <button id="dblBtn" onclick="setDoubleSpeed(this); this.blur();">2x Speed</button>
      <button onclick="spawnShieldBubble(); this.blur();">Spawn Shield Bubble</button>
      <button onclick="spawnBulletBubble(); this.blur();">Spawn Bullet Bubble</button>
      <button onclick="spawnFreezeBubble(); this.blur();">Spawn Freeze Bubble</button>
      <button onclick="giveShield(); this.blur();">Give Me Shield</button>
      <button onclick="giveBullet(); this.blur();">Give Me Bullet Power</button>
      <button onclick="giveFreeze(); this.blur();">Give Me Freeze</button>
      <button onclick="giveAllBots('shield'); this.blur();">Give Bots Shield</button>
      <button onclick="giveAllBots('turret'); this.blur();">Give Bots Bullet</button>
      <button onclick="giveAllBots('freeze'); this.blur();">Give Bots Freeze</button>
      <button onclick="giveAllBotsPower(); this.blur();">Give Bots All Powers</button>
      <button id="hpBtn" onclick="this.textContent='∞ Health: '+(toggleInfHealth()?'ON':'OFF'); this.blur();">∞ Health: OFF</button>
      <button id="missBtn" onclick="this.textContent='∞ Missiles: '+(toggleInfMissiles()?'ON':'OFF'); this.blur();">∞ Missiles: OFF</button>
      <button onclick="resetDefaults(); this.blur();">Reset All Defaults</button>
    </div>
   </div>
   <div class="menuGroup">
    <button id="modeBtn" onclick="toggleModeMenu(); this.blur();">🎮 Mode Menu</button>
    <div id="modeMenu" style="display:none">
      <button onclick="setMode('classic'); this.blur();">Classic Mode</button>
      <button onclick="setMode('unicorn'); this.blur();">🦄 Unicorn Mode</button>
      <button onclick="setMode('badweather'); this.blur();">🌧️ Bad Weather Mode</button>
      <button onclick="setMode('ww2'); this.blur();">🪖 WW2 Mode</button>
      <button onclick="setMode('alien'); this.blur();">👽 Alien Invasion</button>
      <button onclick="setMode('night'); this.blur();">🌙 Night Mode</button>
      <button onclick="setMode('blackhole'); this.blur();">🕳️ Black Hole</button>
      <button onclick="setMode('nomod'); this.blur();">No Mod Mode</button>
    </div>
   </div>
  </div>

  <!-- The scripts run top to bottom, so order matters here -->
  <script src="js/config.js"></script>
  <script src="js/input.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/missile.js"></script>
  <script src="js/explosion.js"></script>
  <script src="js/powerup.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/scenery.js"></script>
  <script src="js/plane.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/pilot.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
