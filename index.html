<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Planes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- This is the box the whole game is drawn onto -->
  <canvas id="game"></canvas>

  <!-- Buttons at the top-middle to add or remove a fighting plane -->
  <div id="botButtons">
    <button onclick="addBot(); this.blur();">+ Add Plane</button>
    <button onclick="removeBot(); this.blur();">- Remove Plane</button>
  </div>

  <!-- The scripts run top to bottom, so order matters here -->
  <script src="js/config.js"></script>
  <script src="js/input.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/missile.js"></script>
  <script src="js/explosion.js"></script>
  <script src="js/powerup.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/scenery.js"></script>
  <script src="js/plane.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/pilot.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
