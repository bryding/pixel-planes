<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>
<canvas id="game"></canvas><div id="clickGate" style="display:none"></div><div id="startScreen"></div>
<div id="settingsScreen" style="display:none"><input type="range" id="volSlider" value="50"><p id="volLabel">50%</p></div>
<div id="topBar"><div id="modGroup"></div><div id="modeGroup"></div></div>
<div id="pauseMenu" style="display:none"><div class="pauseInner" id="pauseMain"></div><div class="pauseInner" id="createServer" style="display:none"></div><div class="pauseInner" id="serverList" style="display:none"></div><div class="pauseInner" id="inServer" style="display:none"></div><div class="pauseInner" id="colorPanel" style="display:none"></div></div>
<div id="mobileControls" style="display:none">
  <button id="mcEsc" class="mcBtn">ESC</button>
  <div class="mcTurn" id="mcTurn"><button id="mcLeft" class="mcBtn">L</button><button id="mcRight" class="mcBtn">R</button></div>
  <button id="mcEject" class="mcBtn mcEjectBtn">EJECT</button>
  <div class="mcThrottleWrap" id="mcThrottleWrap"><input id="mcThrottle" type="range" min="0" max="100" value="100"></div>
  <div class="mcActions" id="mcActions"><button id="mcMissile" class="mcBtn">M</button><button id="mcGun" class="mcBtn">G</button></div>
  <div id="mcUfoPad" style="display:none"><button id="mcUp" class="mcBtn">U</button><button id="mcLeftU" class="mcBtn">L</button><button id="mcRightU" class="mcBtn">R</button><button id="mcDown" class="mcBtn">D</button></div>
</div>
<div id="out">PENDING</div>
<script>window.__e=[];window.onerror=(m,s,l,c)=>window.__e.push(m+' @'+l);</script>
<script src="js/config.js"></script><script src="js/audio.js"></script><script src="js/net.js"></script><script src="js/input.js"></script>
<script src="js/physics.js"></script><script src="js/bullet.js"></script><script src="js/missile.js"></script>
<script src="js/explosion.js"></script><script src="js/powerup.js"></script><script src="js/sprites.js"></script>
<script src="js/scenery.js"></script><script src="js/plane.js"></script><script src="js/enemy.js"></script>
<script src="js/pilot.js"></script><script src="js/game.js"></script>
<script>
const r={};
function tap(){ const b=document.getElementById('mcEject');
  b.dispatchEvent(new PointerEvent('pointerdown',{bubbles:true,pointerId:Math.floor(Math.random()*1e6)}));
  update();
  b.dispatchEvent(new PointerEvent('pointerup',{bubbles:true,pointerId:1}));
  update(); update();   // frames with button released (resets the edge)
}
try{
  startGame(); player.alive=true; playerState='flying';
  tap(); r.ejected = playerState==='chute';
  const before = pilot.chuteOpen;
  tap(); r.toggle1 = pilot.chuteOpen !== before;     // parachute toggled
  const mid = pilot.chuteOpen;
  tap(); r.toggle2 = pilot.chuteOpen !== mid;        // toggled back
  r.err=window.__e;
  document.getElementById('out').textContent='RESULT '+JSON.stringify(r);
}catch(e){document.getElementById('out').textContent='THREW '+e.message;}
</script></body></html>
