<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>
<canvas id="game"></canvas>
<div id="startScreen"></div><div id="settingsScreen" style="display:none"></div>
<div id="topBar"><div id="modGroup"></div><div id="modeGroup"></div></div>
<div id="pauseMenu" style="display:none"><div class="pauseInner" id="pauseMain"></div>
<div class="pauseInner" id="createServer" style="display:none"></div>
<div class="pauseInner" id="serverList" style="display:none"></div>
<div class="pauseInner" id="inServer" style="display:none"></div></div>
<div id="out">P</div>
<script>window.__e=[];window.onerror=(m,s,l,c)=>window.__e.push(m+' @'+l);</script>
<script src="js/config.js"></script><script src="js/net.js"></script><script src="js/input.js"></script>
<script src="js/physics.js"></script><script src="js/bullet.js"></script><script src="js/missile.js"></script>
<script src="js/explosion.js"></script><script src="js/powerup.js"></script><script src="js/sprites.js"></script>
<script src="js/scenery.js"></script><script src="js/plane.js"></script><script src="js/enemy.js"></script>
<script src="js/pilot.js"></script><script src="js/game.js"></script>
<script>
const r={};
try{
  // After load: title screen state
  r.startedFalse = (gameStarted===false);
  r.startVisible = getComputedStyle(document.getElementById('startScreen')).display!=='none';
  r.topBarHidden = document.getElementById('topBar').style.display==='none';
  r.playerParked = (player.alive===false);
  const ex0 = enemies[0].x;
  for(let f=0;f<10;f++){update();draw();}   // attract mode runs
  r.botsMoved = (enemies[0].x !== ex0) || !enemies[0].alive;  // a bot moved/fought
  r.noErrAttract = window.__e.length===0;
  // START
  startGame();
  r.startedTrue = (gameStarted===true);
  r.startHidden = document.getElementById('startScreen').style.display==='none';
  r.topBarShown = document.getElementById('topBar').style.display==='flex';
  r.playerAlive = (player.alive===true);
  for(let f=0;f<8;f++){update();draw();}
  // DEATH must NOT return to the start menu
  playerDies(player.x, player.y, 'TEST');
  for(let f=0;f<8;f++){update();draw();}
  r.deathKeepsPlaying = (gameStarted===true) && document.getElementById('startScreen').style.display==='none';
  // settings open/close
  openSettings(); r.settingsOpen = document.getElementById('settingsScreen').style.display==='flex';
  closeSettings(); r.settingsClosed = document.getElementById('settingsScreen').style.display==='none';
  r.err=window.__e;
  document.getElementById('out').textContent='RESULT '+JSON.stringify(r);
}catch(e){document.getElementById('out').textContent='THREW '+e.message+' | '+e.stack;}
</script></body></html>
